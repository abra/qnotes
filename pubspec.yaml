name: nota
description: "Minimalist note-taking app"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  monitoring:
    path: packages/monitoring

  component_library:
    path: packages/component_library

  preferences_repository:
    path: packages/preferences_repository

  shared:
    path: packages/shared

  notes_repository:
    path: packages/notes_repository

  note_list:
    path: packages/features/note_list

  note_details:
    path: packages/features/note_details

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  package_info_plus: ^9.0.0
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
