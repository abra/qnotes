name: nota
description: "Minimalist note-taking app"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  monitoring:
    path: packages/monitoring

  component_library:
    path: packages/component_library

  preferences_service:
    path: packages/preferences_service

  shared:
    path: packages/shared

  note_repository:
    path: packages/note_repository

  image_files:
    path: packages/image_files

  toast_service:
    path: packages/toast_service

  note_list:
    path: packages/features/note_list

  note_details:
    path: packages/features/note_details

  preferences_menu:
    path: packages/features/preferences_menu

  flutter_quill: ^11.5.0
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  package_info_plus: ^9.0.0
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/nota.png
