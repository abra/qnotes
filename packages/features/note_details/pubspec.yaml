name: note_details
description: "Note details feature: create and edit notes."
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_bloc: ^9.1.1
  shared:
    path: ../../shared
  note_repository:
    path: ../../note_repository
  component_library:
    path: ../../component_library
  toast_service:
    path: ../../toast_service
  flutter_quill: ^11.5.0
  image_files:
    path: ../../image_files
  smart_keyboard_insets: ^0.0.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
